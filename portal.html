<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>החוזה שלכם — להקת קולות KOLOT</title>
  <meta name="description" content="צפייה, התאמה וחתימה דיגיטלית על החוזה שלכם מול להקת קולות (KOLOT).">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0e1b20">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .portal-wrap { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }
    .portal-head { text-align: center; padding: 24px 0 8px; }
    .portal-head .logo { height: 72px; }
    .contract-paper {
      background: #fff; color: #16232a; border-radius: 14px; padding: 0 0 32px;
      box-shadow: var(--shadow); line-height: 1.8; overflow: hidden;
    }
    .contract-paper h2, .contract-paper h3 { color: #0b2830; font-family: var(--font-head); }
    .contract-paper > *:not(.prop-head) { margin-inline: clamp(18px, 5vw, 44px); }

    /* ---- PDF-style proposal (mirrors the KOLOT price proposal) ---- */
    .prop-head {
      position: relative; padding: 22px clamp(18px, 5vw, 44px);
      display: flex; align-items: flex-start; justify-content: space-between;
      background: #eef7fa; margin-bottom: 18px;
    }
    .prop-head-tri { position: absolute; inset: 0 0 auto 0; height: 0; }
    .prop-head-tri::before {
      content: ""; position: absolute; top: 0; inset-inline-start: 0;
      border-block-start: 96px solid #86cdde;
      border-inline-end: 150px solid transparent;
    }
    .prop-head-info { position: relative; z-index: 2; font-size: 13px; color: #0b2830; font-weight: 600; }
    .prop-logo { position: relative; z-index: 2; height: 56px; }
    .prop-title { text-align: center; color: #0b2830; font-size: clamp(24px, 5vw, 34px); margin: 6px 0 2px; letter-spacing: .5px; }
    .prop-event { text-align: center; color: #4b6068; font-weight: 600; margin-top: 0; }
    .prop-intro { color: #2a3b42; }

    .prop-sections { margin-top: 12px; border-top: 1px solid #e4ebee; }
    .prop-section { display: grid; grid-template-columns: 160px 1fr; gap: 14px; padding: 16px 0; border-bottom: 1px solid #e4ebee; }
    .prop-section-label { color: #6b7c83; font-family: var(--font-head); font-size: 19px; }
    .prop-section-name { font-weight: 800; color: #0b2830; }
    .prop-section-details { color: #33454c; white-space: pre-line; }
    @media (max-width: 560px) { .prop-section { grid-template-columns: 1fr; gap: 4px; } }

    .prop-package { margin-top: 14px; }
    .prop-inc { padding: 4px 0; }
    .prop-price {
      margin-top: 18px; background: #0b2830; color: #f7c11e;
      border-radius: 10px; padding: 14px 18px; text-align: center;
      font-family: var(--font-head); font-size: 22px; font-weight: 800;
    }
    .prop-terms { margin-top: 22px; padding-top: 14px; border-top: 2px solid #0b2830; color: #33454c; }
    .prop-field { padding: 3px 0; }

    .opt-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; background: var(--bg-soft); }
    .opt-row input { width: auto; }
    .price-banner {
      position: sticky; bottom: 12px; z-index: 30;
      background: var(--brand); color: var(--brand-ink);
      border-radius: 12px; padding: 14px 20px; text-align: center;
      font-family: var(--font-head); font-size: 20px; box-shadow: var(--shadow);
    }
    .sig-img { max-height: 70px; background: #fff; border-radius: 8px; padding: 4px 10px; }

    /* interactive cards live inside the white paper → keep them light (and PDF-safe) */
    .proposal .card { background: #fff; color: #16232a; border: 1px solid #e4ebee; box-shadow: none; }
    .proposal .card h3 { color: #0b2830; }
    .proposal .field span { color: #4b6068; }
    .proposal input, .proposal textarea, .proposal select { background: #fff; color: #16232a; border: 1px solid #cdd8dc; }
    .proposal .muted { color: #6b7c83; }
    .proposal .opt-row { background: #f6fafb; border-color: #e4ebee; }
  </style>
</head>
<body>
  <div class="portal-wrap" id="portal">
    <div class="portal-head">
      <img class="logo" src="/assets/logo.svg" alt="KOLOT — להקת קולות">
      <p class="muted">טוען את החוזה…</p>
    </div>
  </div>
  <div id="toasts" aria-live="polite"></div>
  <script>window.__API_BASE__ = 'https://zooglot-backend.up.railway.app';</script>
  <script src="/vendor/html2pdf.bundle.min.js"></script>
  <script type="module" src="/js/portal.js"></script>
</body>
</html>
