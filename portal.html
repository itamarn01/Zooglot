<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>החוזה שלכם — להקת קולות KOLOT</title>
  <meta name="description" content="צפייה, התאמה וחתימה דיגיטלית על החוזה שלכם מול להקת קולות (KOLOT).">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0e1b20">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .portal-wrap { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }
    .portal-head { text-align: center; padding: 24px 0 8px; }
    .portal-head .logo { height: 72px; }
    .contract-paper {
      background: #fff; color: #16232a; border-radius: 14px; padding: 0 0 32px;
      box-shadow: var(--shadow); line-height: 1.8; overflow: hidden;
    }
    .contract-paper h2, .contract-paper h3 { color: #0b2830; font-family: var(--font-head); }
    .contract-paper > *:not(.prop-head) { margin-inline: clamp(18px, 5vw, 44px); }

    /* ---- PDF-style proposal (mirrors the KOLOT price proposal) ---- */
    .prop-head {
      position: relative; height: 140px; margin: 0 0 18px; overflow: hidden;
      background: #fff;
    }
    /* diagonal cyan band always on the physical left (as in the PDF), regardless
       of text direction. It covers ~70% of the width (76% at the top edge,
       64% at the bottom), leaving the right ~30% for the logo. */
    .prop-head-tri {
      position: absolute; inset: 0; background: #8ececd;
      clip-path: polygon(0 0, 76% 0, 64% 100%, 0 100%);
    }
    .prop-head-info {
      position: absolute; top: 16px; left: clamp(16px, 5vw, 40px); z-index: 2;
      font-size: 12px; color: #fff; font-weight: 700; letter-spacing: 1px; line-height: 1.7;
      text-transform: uppercase; direction: ltr; text-align: left;
    }
    /* logo sits centred in the right 30% of the band */
    .prop-head-brand {
      position: absolute; top: 50%; transform: translateY(-50%);
      right: clamp(10px, 2.5vw, 26px); z-index: 2; width: 28%; text-align: center;
    }
    .prop-logo { width: 100%; max-height: 112px; height: auto; object-fit: contain; display: block; margin: 0 auto; }
    /* shown only if the SVG fails to load, so the brand is never simply missing */
    .prop-logo-fallback { color: #8ececd; font-family: var(--font-head); line-height: 1; }
    .prop-logo-fallback b { display: block; font-size: 40px; letter-spacing: 2px; }
    .prop-logo-fallback span { font-size: 12px; letter-spacing: 4px; }
    .prop-event { text-align: center; color: #4b6068; font-weight: 600; margin: 0 0 8px; }

    /* keep any pasted content (Word/Docs tables, images, long words) inside the page */
    .proposal { overflow-wrap: anywhere; }
    .proposal img { max-width: 100%; height: auto; }
    .proposal table { max-width: 100% !important; width: auto !important; table-layout: auto; border-collapse: collapse; }
    .proposal td, .proposal th { max-width: 100%; word-break: break-word; }
    .proposal :is(.prop-textblock, .pp-text, .pp-name, .pp-desc, .prop-section-label) { overflow-wrap: anywhere; word-break: break-word; }

    /* typed sections */
    .prop-titleblock { text-align: center; color: #0b2830; font-size: clamp(22px, 4.5vw, 32px); font-family: var(--font-head); margin: 10px 0 4px; }
    .prop-titleblock :is(h1,h2,h3,p) { margin: 0; }
    .prop-textblock { color: #33454c; margin: 10px 0; }
    .prop-textblock.cols2 { column-count: 2; column-gap: 26px; }
    @media (max-width: 560px) { .prop-textblock.cols2 { column-count: 1; } }
    .prop-textblock h3 { color: #0b2830; margin: 12px 0 4px; }

    .prop-section { display: grid; grid-template-columns: 150px 1fr; gap: 16px; padding: 16px 0; border-top: 1px solid #e4ebee; }
    .prop-section-label { color: #6b7c83; font-family: var(--font-head); font-size: 19px; }
    .prop-section-body { display: flex; flex-direction: column; gap: 10px; }
    .prop-prod { display: flex; align-items: flex-start; gap: 8px; }
    .prop-prod.optional { border: 1px solid #e4ebee; border-radius: 10px; padding: 8px 10px; background: #f6fafb; cursor: pointer; }
    .prop-prod.optional input { width: auto; margin-top: 3px; }
    .prop-prod.dim { opacity: .45; }
    .pp-check { color: #2fae7a; font-weight: 800; }
    .pp-name { font-weight: 800; color: #0b2830; }
    .pp-name :is(h1,h2,h3,p) { margin: 0; display: inline; }
    .pp-desc { color: #33454c; }
    .pp-desc :is(p) { margin: 2px 0; }
    .pp-price { color: #0b2830; white-space: nowrap; }
    /* 2-column layouts (text split / products in two columns) */
    .pp-text.cols2 { column-count: 2; column-gap: 20px; }
    .prop-section-body.cols2 { display: block; column-count: 2; column-gap: 20px; }
    .prop-section-body.cols2 .prop-prod { break-inside: avoid; margin-bottom: 10px; }
    @media (max-width: 560px) { .pp-text.cols2, .prop-section-body.cols2 { column-count: 1; } }
    /* preview edit mode: clicking a section jumps to it in the editor */
    .edit-clickable { cursor: pointer; }
    .edit-clickable:hover { outline: 2px dashed #86cdde; outline-offset: 3px; border-radius: 6px; }
    @media (max-width: 560px) { .prop-section { grid-template-columns: 1fr; gap: 6px; } }

    .prop-price {
      margin-top: 18px; background: #0b2830; color: #f7c11e;
      border-radius: 10px; padding: 14px 18px; text-align: center;
      font-family: var(--font-head); font-size: 22px; font-weight: 800;
    }
    .prop-field { padding: 3px 0; }

    /* preview-only floating "+ add section" control */
    .edit-add { position: relative; display: flex; justify-content: center; margin: 2px 0; min-height: 14px; }
    .edit-add-btn {
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer; line-height: 1;
      border: 1px dashed #86cdde; background: #eef7fa; color: #0b7a86; opacity: .45; transition: opacity .15s;
    }
    .edit-add:hover .edit-add-btn { opacity: 1; }
    .edit-add-menu {
      display: none; position: absolute; top: 28px; z-index: 40; gap: 4px;
      background: #fff; border: 1px solid #cdd8dc; border-radius: 8px; padding: 6px; box-shadow: 0 6px 18px rgba(0,0,0,.18);
    }
    .edit-add-menu.open { display: flex; }

    .opt-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; background: var(--bg-soft); }
    .opt-row input { width: auto; }
    .price-banner {
      position: sticky; bottom: 12px; z-index: 30;
      background: var(--brand); color: var(--brand-ink);
      border-radius: 12px; padding: 14px 20px; text-align: center;
      font-family: var(--font-head); font-size: 20px; box-shadow: var(--shadow);
    }
    .sig-img { max-height: 70px; background: #fff; border-radius: 8px; padding: 4px 10px; }

    /* interactive cards live inside the white paper → keep them light (and PDF-safe) */
    .proposal .card { background: #fff; color: #16232a; border: 1px solid #e4ebee; box-shadow: none; }
    .proposal .card h3 { color: #0b2830; }
    .proposal .field span { color: #4b6068; }
    .proposal input, .proposal textarea, .proposal select { background: #fff; color: #16232a; border: 1px solid #cdd8dc; }
    .proposal .muted { color: #6b7c83; }
    .proposal .opt-row { background: #f6fafb; border-color: #e4ebee; }
  </style>
</head>
<body>
  <div class="portal-wrap" id="portal">
    <div class="portal-head">
      <img class="logo" src="/assets/logo.svg" alt="KOLOT — להקת קולות">
      <p class="muted">טוען את החוזה…</p>
    </div>
  </div>
  <div id="toasts" aria-live="polite"></div>
  <script>window.__API_BASE__ = 'https://zooglot-backend.up.railway.app';</script>
  <script src="/vendor/html2pdf.bundle.min.js"></script>
  <script type="module" src="/js/portal.js"></script>
</body>
</html>
