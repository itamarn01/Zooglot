<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>החוזה שלכם — להקת קולות KOLOT</title>
  <meta name="description" content="צפייה, התאמה וחתימה דיגיטלית על החוזה שלכם מול להקת קולות (KOLOT).">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0e1b20">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* Stop iOS Safari from auto-inflating text: the proposal is a fixed 794px
       page zoomed to fit, and without this Safari enlarges the text on narrow
       screens, breaking the PDF-exact proportions. */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    /* KOLOT display face — used for the cyan header block and title-only sections */
    @font-face {
      font-family: 'Adam CG Pro';
      src: url('/assets/fonts/ADAM.CG%20PRO.otf') format('opentype');
      font-weight: normal; font-style: normal; font-display: swap;
    }
    .portal-wrap { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }
    .portal-head { text-align: center; padding: 24px 0 8px; }
    .portal-head .logo { height: 72px; }
    /* The proposal is rendered at a FIXED page width (like an A4 sheet) and then
       scaled to fit the screen by JS (see fitPage), so the mobile view is a true
       scaled-down copy of the desktop/PDF — never a reflowed one. Everything
       inside therefore uses fixed px (no vw / viewport media queries). */
    .page-fit { overflow-x: hidden; }
    .contract-paper {
      width: 794px; margin: 0 auto; /* A4 @96dpi; JS zooms this element to fit */
      background: #fff; color: #16232a; border-radius: 14px; padding: 0 0 32px;
      box-shadow: var(--shadow); line-height: 1.8; overflow: hidden;
      font-family: 'Assistant', 'Arial Hebrew', Arial, sans-serif; font-size: 16px;
    }
    .contract-paper h2, .contract-paper h3 { color: #0b2830; font-family: var(--font-head); }
    .contract-paper > *:not(.prop-head) { margin-inline: 44px; }

    /* ---- PDF-style proposal (mirrors the KOLOT price proposal) ---- */
    .prop-head {
      position: relative; height: 140px; margin: 0 0 18px; overflow: hidden;
      background: #fff;
    }
    /* cyan right-triangle sitting on the top-left corner (as in the PDF); the
       right angle is at the corner, the hypotenuse runs down to the bottom-left.
       The logo lives in the free space on the right. */
    .prop-head-tri {
      position: absolute; inset: 0; background: #87CEDF;
      clip-path: polygon(0 0, 70% 0, 0 100%);
    }
    .prop-head-info {
      position: absolute; top: 14px; left: 34px; z-index: 2;
      font-family: 'Adam CG Pro', var(--font-head); font-size: 13px; color: #fff;
      font-weight: 400; letter-spacing: 1px; line-height: 1.5;
      text-transform: uppercase; direction: ltr; text-align: left;
    }
    /* logo sits centred in the right 30% of the band */
    .prop-head-brand {
      position: absolute; top: 50%; transform: translateY(-50%);
      right: 24px; z-index: 2; width: 28%; text-align: center;
    }
    .prop-logo { width: 100%; max-height: 112px; height: auto; object-fit: contain; display: block; margin: 0 auto; }
    /* shown only if the SVG fails to load, so the brand is never simply missing */
    .prop-logo-fallback { color: #87CEDF; font-family: var(--font-head); line-height: 1; }
    .prop-logo-fallback b { display: block; font-size: 40px; letter-spacing: 2px; }
    .prop-logo-fallback span { font-size: 12px; letter-spacing: 4px; }

    /* keep any pasted content (Word/Docs tables, images, long words) inside the page */
    .proposal { overflow-wrap: anywhere; }
    .proposal img { max-width: 100%; height: auto; }
    .proposal table { max-width: 100% !important; width: auto !important; table-layout: auto; border-collapse: collapse; }
    .proposal td, .proposal th { max-width: 100%; word-break: break-word; }
    .proposal :is(.prop-textblock, .pp-text, .pp-name, .pp-desc, .prop-section-label) { overflow-wrap: anywhere; word-break: break-word; }

    /* typed sections. Adam CG Pro is Latin-only, so Hebrew glyphs fall back to
       Assistant automatically (per-glyph) — Latin titles get the KOLOT look,
       Hebrew names stay legible. No forced uppercase (a no-op on Hebrew). */
    .prop-titleblock {
      text-align: center; color: #0b2830; font-size: 34px;
      font-family: 'Adam CG Pro', var(--font-head); letter-spacing: .5px; margin: 14px 0 6px;
    }
    .prop-titleblock :is(h1,h2,h3,p) { font-family: inherit; }
    .prop-titleblock :is(h1,h2,h3,p) { margin: 0; }
    .prop-textblock { color: #33454c; margin: 10px 0; }
    .prop-textblock.cols2 { column-count: 2; column-gap: 26px; }
    .prop-textblock h3 { color: #0b2830; margin: 12px 0 4px; }

    .prop-section { display: grid; grid-template-columns: 150px 1fr; gap: 16px; padding: 16px 0; border-top: 1px solid #e4ebee; }
    /* side titles: Assistant ExtraLight, per the KOLOT proposal look */
    .prop-section-label { color: #6b7c83; font-family: 'Assistant', sans-serif; font-weight: 200; font-size: 21px; }
    .prop-section-label :is(h1,h2,h3,p,b,strong) { font-family: inherit; font-weight: 200; }
    .prop-section-body { display: flex; flex-direction: column; gap: 10px; }
    .prop-prod { display: flex; align-items: flex-start; gap: 8px; }
    .prop-prod.optional { border: 1px solid #e4ebee; border-radius: 10px; padding: 8px 10px; background: #f6fafb; cursor: pointer; }
    .prop-prod.optional input { width: auto; margin-top: 3px; }
    .prop-prod.dim { opacity: .45; }
    /* post-sign add-ons: still selectable after signing (upsell) */
    .prop-prod.addon { border-style: dashed; border-color: #86cdde; background: #f2fafc; }
    .prop-prod.addon.on { border-style: solid; background: #e7f6fa; }
    .pp-addon-hint { color: #0b7a86; font-size: 13px; margin-top: 8px; font-weight: 600; }
    .pp-check { color: #2fae7a; font-weight: 800; }
    .pp-name { font-weight: 800; color: #0b2830; }
    .pp-name :is(h1,h2,h3,p) { margin: 0; display: inline; }
    .pp-desc { color: #33454c; }
    .pp-desc :is(p) { margin: 2px 0; }
    .pp-price { color: #0b2830; white-space: nowrap; }
    /* 2-column layouts (text split / products in two columns) */
    .pp-text.cols2 { column-count: 2; column-gap: 20px; }
    .prop-section-body.cols2 { display: block; column-count: 2; column-gap: 20px; }
    .prop-section-body.cols2 .prop-prod { break-inside: avoid; margin-bottom: 10px; }
    /* preview edit mode: clicking a section jumps to it in the editor */
    .edit-clickable { cursor: pointer; }
    .edit-clickable:hover { outline: 2px dashed #86cdde; outline-offset: 3px; border-radius: 6px; }

    /* signature row: the name field flexes, "Clear" never wraps mid-word */
    .sig-row { display: flex; gap: 8px; align-items: center; }
    .sig-row input { flex: 1; min-width: 0; }
    .sig-row .btn { flex: none; white-space: nowrap; }

    /* TOTAL box: a light breakdown card, then the dark grand-total bar */
    .pp-total-wrap { margin-top: 20px; }
    .pp-total-lines {
      background: #f4f8f9; border: 1px solid #e4ebee; border-bottom: none;
      border-radius: 10px 10px 0 0; padding: 12px 18px;
    }
    .pp-total-row {
      display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
      color: #33454c; font-size: 16px; padding: 3px 0;
    }
    .pp-strike { color: #90a1a8; }
    .pp-discount { color: #c0392b; font-weight: 700; }
    .prop-price {
      display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
      background: #0b2830; color: #f7c11e; padding: 15px 18px;
      border-radius: 10px; font-family: var(--font-head); font-size: 23px; font-weight: 800;
    }
    .pp-total-lines + .prop-price { border-radius: 0 0 10px 10px; }
    .pp-vat-note { text-align: center; color: #6b7c83; font-size: 12.5px; margin-top: 6px; }
    .prop-field { padding: 3px 0; }
    /* fillable field rows open the floating data-entry sheet */
    .prop-field.fillable { cursor: pointer; border-radius: 6px; transition: background .12s; }
    .prop-field.fillable:hover { background: #eef7fa; }
    .fill-ico { opacity: .6; }

    /* floating data entry — keeps the page itself input-free (PDF-like) */
    .data-fab {
      position: fixed; inset-block-end: 18px; inset-inline: 0; margin-inline: auto; width: max-content;
      z-index: 55; background: #f7c11e; color: #1a1400; border: none; cursor: pointer;
      border-radius: 999px; padding: 12px 24px; font-weight: 800; font-size: 15px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
    }
    .data-sheet {
      position: fixed; inset-inline: 0; inset-block-end: 0; z-index: 60; max-width: 720px; margin-inline: auto;
      background: #fff; color: #16232a; border-radius: 16px 16px 0 0;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, .4);
      padding: 16px clamp(14px, 4vw, 24px) calc(18px + env(safe-area-inset-bottom, 0px));
      max-height: 82vh; overflow-y: auto; transform: translateY(112%); transition: transform .25s ease;
    }
    .data-sheet.open { transform: translateY(0); }
    .data-sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .data-sheet-head b { font-size: 18px; color: #0b2830; }
    .data-sheet-body { display: grid; gap: 10px; margin-bottom: 14px; }
    .data-sheet .field span { color: #4b6068; font-size: 13px; }
    .data-sheet input { background: #fff; color: #16232a; border: 1px solid #cdd8dc; border-radius: 8px; padding: 9px 11px; width: 100%; }

    /* mobile: tighter desk margins around the scaled A4 sheet */
    @media (max-width: 640px) {
      .portal-wrap { padding: 12px 8px 92px; }
    }

    /* preview-only floating "+ add section" control */
    .edit-add { position: relative; display: flex; justify-content: center; margin: 2px 0; min-height: 14px; }
    .edit-add-btn {
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer; line-height: 1;
      border: 1px dashed #86cdde; background: #eef7fa; color: #0b7a86; opacity: .45; transition: opacity .15s;
    }
    .edit-add:hover .edit-add-btn { opacity: 1; }
    .edit-add-menu {
      display: none; position: absolute; top: 28px; z-index: 40; gap: 4px;
      background: #fff; border: 1px solid #cdd8dc; border-radius: 8px; padding: 6px; box-shadow: 0 6px 18px rgba(0,0,0,.18);
    }
    .edit-add-menu.open { display: flex; }

    .opt-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; background: var(--bg-soft); }
    .opt-row input { width: auto; }
    .sig-img { max-height: 70px; background: #fff; border-radius: 8px; padding: 4px 10px; }
    .sig-list { display: flex; flex-wrap: wrap; gap: 14px; }
    .sig-one { text-align: center; }

    /* interactive cards live inside the white paper → keep them light (and PDF-safe) */
    .proposal .card { background: #fff; color: #16232a; border: 1px solid #e4ebee; box-shadow: none; }
    .proposal .card h3 { color: #0b2830; }
    .proposal .field span { color: #4b6068; }
    .proposal input, .proposal textarea, .proposal select { background: #fff; color: #16232a; border: 1px solid #cdd8dc; }
    .proposal .muted { color: #6b7c83; }
    .proposal .opt-row { background: #f6fafb; border-color: #e4ebee; }
  </style>
</head>
<body>
  <div class="portal-wrap" id="portal">
    <div class="portal-head">
      <img class="logo" src="/assets/logo.svg" alt="KOLOT — להקת קולות">
      <p class="muted">טוען את החוזה…</p>
    </div>
  </div>
  <div id="toasts" aria-live="polite"></div>
  <script>window.__API_BASE__ = 'https://zooglot-backend.up.railway.app';</script>
  <script src="/vendor/html2pdf.bundle.min.js"></script>
  <script type="module" src="/js/portal.js"></script>
</body>
</html>
